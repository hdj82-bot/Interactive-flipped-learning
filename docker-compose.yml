services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A app.celery_app:celery worker --loglevel=info --pool=solo
    env_file: .env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - redis
