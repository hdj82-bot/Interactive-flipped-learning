services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ifl
      POSTGRES_PASSWORD: ifl
      POSTGRES_DB: ifl_heygen
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  api:
    build: .
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      - redis
      - postgres

  worker:
    build: .
    command: celery -A app.celery_app:celery worker --loglevel=info --pool=solo
    env_file: .env
    depends_on:
      - redis
      - postgres

  beat:
    build: .
    command: celery -A app.celery_app:celery beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - postgres

volumes:
  pgdata:
